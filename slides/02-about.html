<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>About — P2 Boutique Hotel</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="slide-base.css">
<style>
  .slide.about {
    background: var(--p2-ivory);
    display: grid;
    grid-template-columns: 880px 1fr;
    align-items: stretch;
  }
  .photo-col {
    position: relative;
    overflow: hidden;
  }
  .photo-col img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  /* Cream sliver of overlap on right edge */
  .photo-col::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 80%, rgba(244, 245, 240, 0.4));
    pointer-events: none;
  }
  .text-col {
    padding: 120px 120px 120px 96px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .text-col .eyebrow { margin-bottom: 28px; }
  .text-col .h-section { margin-bottom: 36px; max-width: 860px; }
  .text-col .body-lead { margin: 0 0 28px 0; max-width: 760px; }
  .text-col .body-text { margin: 0 0 56px 0; max-width: 760px; }

  .pillars-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 820px;
    margin-top: 8px;
  }
  .pillar {
    border-top: 2px solid var(--p2-copper-500);
    padding-top: 20px;
  }
  .pillar .num {
    font-family: var(--font-serif-display);
    font-style: italic;
    color: var(--p2-copper-500);
    font-size: 24px;
    line-height: 1;
    margin-bottom: 10px;
  }
  .pillar .label {
    font-family: var(--font-sans-sc);
    font-weight: 700;
    color: var(--p2-green-900);
    font-size: 22px;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .pillar .desc {
    font-family: var(--font-sans-sc);
    font-size: 16px;
    color: var(--p2-sage-gray);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide-stage">
  <div class="slide-scale" id="scale">
    <section class="slide about" data-screen-label="02 About">
      <div class="corner-mark">
        <span class="p">P</span><span class="two">2</span>
        <span class="wm">Boutique Hotel</span>
      </div>
      <div class="photo-col">
        <img src="../assets/photos/lobby-03.jpg" alt="">
      </div>
      <div class="text-col">
        <div class="eyebrow">About Us</div>
        <h2 class="h-section">温馨舒适的<br>市中心精品酒店</h2>
        <p class="body-lead">P2 精品酒店坐落于曼谷市中心繁华的水门 (Pratunam) 商圈，是一家温馨舒适的三星级精品酒店。步行即可抵达多个大型购物中心、夜市与著名地标。</p>
        <p class="body-text">我们以亲切的服务、整洁的客房和超高的性价比，让每一位远道而来的宾客都能享有宾至如归的旅程。</p>

        <div class="pillars-row">
          <div class="pillar">
            <div class="num">01</div>
            <div class="label">黄金地段</div>
            <div class="desc">水门商圈核心位置</div>
          </div>
          <div class="pillar">
            <div class="num">02</div>
            <div class="label">高性价比</div>
            <div class="desc">990 泰铢／晚起</div>
          </div>
          <div class="pillar">
            <div class="num">03</div>
            <div class="label">贴心服务</div>
            <div class="desc">24 小时前台迎宾</div>
          </div>
        </div>
      </div>
      <div class="slide-footer">P2 Boutique Hotel · Pratunam</div>
      <div class="page-number">02 / 09</div>
    </section>
  </div>
</div>
<script>
  function fit(){
    const s = document.getElementById('scale');
    const k = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    const x = (window.innerWidth - 1920*k)/2;
    const y = (window.innerHeight - 1080*k)/2;
    s.style.transform = `translate(${x}px, ${y}px) scale(${k})`;
  }
  fit(); addEventListener('resize', fit);
</script>
</body>
</html>
