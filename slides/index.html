<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>P2 Boutique Hotel · Slide Deck</title>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#FAF6EC"/>
    <text x="100" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="76" fill="#0F3D38" font-weight="500">P</text>
    <text x="138" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="46" fill="#C8A95A" font-weight="500">2</text>
    <text x="100" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F3D38" letter-spacing="2.2">BOUTIQUE HOTEL</text>
    <text x="100" y="150" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#C8A95A">Pratunam · Bangkok</text>
  </svg>
</template>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--p2-ink); height: 100vh; overflow: hidden; font-family: var(--font-sans-sc); }
  .stage { position: fixed; inset: 0; display: grid; place-items: center; }
  iframe { border: none; background: #000; box-shadow: 0 24px 80px rgba(0,0,0,0.5); display: block; }
  .chrome {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: rgba(15, 61, 56, 0.94);
    color: var(--p2-cream);
    padding: 10px 16px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--font-sans-latin);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    z-index: 10;
    backdrop-filter: blur(12px);
  }
  .chrome button {
    background: transparent;
    color: var(--p2-cream);
    border: 1px solid rgba(250, 246, 236, 0.3);
    border-radius: 999px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: all 240ms cubic-bezier(0.22,1,0.36,1);
  }
  .chrome button:hover { background: var(--p2-gold-500); color: var(--p2-ink); border-color: var(--p2-gold-500); }
  .chrome .count { color: var(--p2-gold-500); font-weight: 600; }
  .chrome .title { color: rgba(250, 246, 236, 0.8); font-size: 11px; }
</style>
</head>
<body>
<div class="stage">
  <iframe id="frame" width="1920" height="1080" src="01-title.html"></iframe>
</div>
<div class="chrome">
  <button id="prev">← Prev</button>
  <span class="count" id="count">01 / 09</span>
  <span class="title" id="title">Title</span>
  <button id="next">Next →</button>
</div>
<script>
  const slides = [
    { src: '01-title.html',          name: 'Title' },
    { src: '02-about.html',          name: 'About' },
    { src: '03-room.html',           name: 'Room · Superior' },
    { src: '04-facilities.html',     name: 'Facilities' },
    { src: '05-location.html',       name: 'Location' },
    { src: '06-why-choose-us.html',  name: 'Why Choose Us' },
    { src: '07-gallery.html',        name: 'Gallery' },
    { src: '08-pricing.html',        name: 'Pricing' },
    { src: '09-closing.html',        name: 'Contact & Booking' },
  ];
  let idx = parseInt(new URLSearchParams(location.search).get('s') || '0', 10);
  if (isNaN(idx) || idx < 0 || idx >= slides.length) idx = 0;
  const frame = document.getElementById('frame');
  const count = document.getElementById('count');
  const title = document.getElementById('title');
  function fit() {
    const k = Math.min(window.innerWidth / 1920, (window.innerHeight - 80) / 1080) * 0.92;
    frame.style.transform = `scale(${k})`;
    frame.style.transformOrigin = 'center center';
  }
  function go(i) {
    idx = (i + slides.length) % slides.length;
    frame.src = slides[idx].src;
    count.textContent = `${String(idx+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;
    title.textContent = slides[idx].name;
    const u = new URL(location.href); u.searchParams.set('s', idx); history.replaceState(null, '', u);
    localStorage.setItem('p2-deck-slide', idx);
  }
  document.getElementById('prev').onclick = () => go(idx - 1);
  document.getElementById('next').onclick = () => go(idx + 1);
  addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') go(idx + 1);
    if (e.key === 'ArrowLeft') go(idx - 1);
  });
  fit(); addEventListener('resize', fit);
  // Restore last slide
  const saved = parseInt(localStorage.getItem('p2-deck-slide') || '0', 10);
  if (!isNaN(saved) && new URLSearchParams(location.search).get('s') === null) {
    go(saved);
  } else {
    go(idx);
  }
</script>
</body>
</html>
